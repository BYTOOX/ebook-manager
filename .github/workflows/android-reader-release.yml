name: Android Reader Release

on:
  push:
    tags:
      - "v*"
      - "android-reader-v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: android-reader

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Restore release keystore
        if: ${{ secrets.AURELIA_KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.AURELIA_KEYSTORE_BASE64 }}" | base64 -d > aurelia-release.jks

      - name: Build unsigned release artifacts
        if: ${{ secrets.AURELIA_KEYSTORE_BASE64 == '' }}
        run: ./gradlew :app:assembleRelease :app:bundleRelease --stacktrace

      - name: Build signed release artifacts
        if: ${{ secrets.AURELIA_KEYSTORE_BASE64 != '' }}
        env:
          AURELIA_KEYSTORE_PATH: ${{ github.workspace }}/android-reader/aurelia-release.jks
          AURELIA_KEYSTORE_PASSWORD: ${{ secrets.AURELIA_KEYSTORE_PASSWORD }}
          AURELIA_KEY_ALIAS: ${{ secrets.AURELIA_KEY_ALIAS }}
          AURELIA_KEY_PASSWORD: ${{ secrets.AURELIA_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease :app:bundleRelease --stacktrace

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: aurelia-reader-release-apk
          path: android-reader/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: aurelia-reader-release-aab
          path: android-reader/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
