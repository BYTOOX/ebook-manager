services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aurelia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aurelia}
      POSTGRES_DB: ${POSTGRES_DB:-aurelia}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aurelia} -d ${POSTGRES_DB:-aurelia}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://aurelia:aurelia@postgres:5432/aurelia
      LIBRARY_PATH: /data/library
      INCOMING_PATH: /data/library/incoming
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
    volumes:
      - library_data:/data/library
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_DEV_API_PROXY_TARGET: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  library_data:
