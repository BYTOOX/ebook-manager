services:
  backend:
    build: ./backend
    container_name: ebook-manager-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data/db:/data/db
      - ./data/library:/data/library

  frontend:
    build: ./frontend
    container_name: ebook-manager-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
